id: multi-agent-chat
name: Multi-Agent Group Chat
category: orchestration
description: |
  Multi-Agent Group Chat connects multiple specialised LLM agents through a
  shared communication channel managed by a router. Each agent has a distinct
  role and system prompt, and the router decides which agent should respond
  next based on the conversation context.

  This pattern is effective for complex tasks that benefit from diverse
  perspectives or domain expertise. By decomposing the problem across
  specialists, it can produce higher-quality outputs than a single generalist
  agent, at the cost of increased token usage and coordination complexity.
when_to_use:
  - Complex tasks requiring multiple areas of domain expertise
  - Scenarios where diverse perspectives improve output quality
  - Collaborative problem solving such as design review or code review
  - Tasks that naturally decompose into specialist sub-roles
when_not_to_use:
  - Simple tasks solvable by a single agent
  - Latency-critical applications where multi-turn coordination is too slow
  - Cost-constrained environments where multiple LLM calls are prohibitive
trade_offs:
  token_cost: high
  latency: high
  reliability: medium
  complexity: high
  adaptability: high
failure_modes:
  - Agents talk past each other without converging on a solution
  - Router fails to select the appropriate specialist for the current context
  - Unbounded conversation loops when no agent produces a final answer
  - Redundant work when agents repeat each other's analysis
compatible_with:
  - routing
  - handoff
conflicts_with:
  - plan-execute
example_graph:
  nodes:
    - id: input-1
      type: input
      label: User Message
      position: { x: 0, y: 200 }
      config: { description: "User's request for the group" }
      pattern_id: multi-agent-chat
      metadata: {}
    - id: router-1
      type: router
      label: Chat Coordinator
      position: { x: 250, y: 200 }
      config: { strategy: llm, routes: [researcher, critic, synthesiser] }
      pattern_id: multi-agent-chat
      metadata: {}
    - id: llm-researcher
      type: llm
      label: Researcher Agent
      position: { x: 500, y: 50 }
      config: { model: claude-sonnet-4, temperature: 0.7, max_tokens: 1024, system_prompt: "You are a research specialist." }
      pattern_id: multi-agent-chat
      metadata: {}
    - id: llm-critic
      type: llm
      label: Critic Agent
      position: { x: 500, y: 200 }
      config: { model: claude-sonnet-4, temperature: 0.3, max_tokens: 1024, system_prompt: "You critically evaluate proposals." }
      pattern_id: multi-agent-chat
      metadata: {}
    - id: llm-synthesiser
      type: llm
      label: Synthesiser Agent
      position: { x: 500, y: 350 }
      config: { model: claude-sonnet-4, temperature: 0.5, max_tokens: 2048, system_prompt: "You synthesise group discussion into a final answer." }
      pattern_id: multi-agent-chat
      metadata: {}
    - id: output-1
      type: output
      label: Group Answer
      position: { x: 750, y: 200 }
      config: { description: "Synthesised group response" }
      pattern_id: multi-agent-chat
      metadata: {}
  edges:
    - id: e-input-router
      source: input-1
      target: router-1
      source_handle: output
      target_handle: input
      type: data_flow
      label: null
    - id: e-router-researcher
      source: router-1
      target: llm-researcher
      source_handle: routed_output
      target_handle: prompt
      type: control_flow
      label: null
    - id: e-router-critic
      source: router-1
      target: llm-critic
      source_handle: routed_output
      target_handle: prompt
      type: control_flow
      label: null
    - id: e-router-synthesiser
      source: router-1
      target: llm-synthesiser
      source_handle: routed_output
      target_handle: prompt
      type: control_flow
      label: null
    - id: e-researcher-router
      source: llm-researcher
      target: router-1
      source_handle: response
      target_handle: input
      type: data_flow
      label: null
    - id: e-critic-router
      source: llm-critic
      target: router-1
      source_handle: response
      target_handle: input
      type: data_flow
      label: null
    - id: e-synthesiser-output
      source: llm-synthesiser
      target: output-1
      source_handle: response
      target_handle: input
      type: data_flow
      label: null
eval_profile:
  tokens_per_step: [400, 1200, 3000]
  steps_per_task: [4, 10, 30]
  p50_latency_ms: 5000
  p99_latency_ms: 25000
  failure_rate: 0.12
