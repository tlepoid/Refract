id: react
name: ReAct
category: orchestration
description: |
  ReAct (Reasoning + Acting) interleaves chain-of-thought reasoning with
  tool-calling actions in a loop. At each step the LLM observes the current
  state, reasons about what to do next, selects and invokes a tool, then
  incorporates the result before deciding the next action.

  This pattern excels at tasks where the solution path cannot be predetermined.
  The agent adapts its strategy based on intermediate results, making it ideal
  for open-ended research, multi-step problem solving, and tasks that require
  exploration of an unknown environment.
when_to_use:
  - Dynamic tasks where the solution path is not predictable
  - Tasks requiring exploration and adaptation based on intermediate results
  - Open-ended research or information gathering across multiple sources
  - Multi-step problem solving where each step depends on prior outcomes
when_not_to_use:
  - Predictable workflows with known steps and fixed order
  - Cost-sensitive applications where token budget is constrained
  - Simple single-shot tasks that do not require iterative reasoning
trade_offs:
  token_cost: high
  latency: high
  reliability: medium
  complexity: medium
  adaptability: high
failure_modes:
  - Infinite reasoning loops without convergence on an answer
  - Excessive token consumption on simple tasks that could be solved directly
  - Hallucinating tool results instead of actually invoking the tool
  - Getting stuck in local optima and failing to explore alternative approaches
compatible_with:
  - reflection
  - routing
conflicts_with:
  - plan-execute
