id: routing
name: Semantic/Rule-Based Routing
category: orchestration
description: |
  Routing directs incoming requests to the appropriate handler based on
  semantic understanding, explicit rules, or a combination of both. A router
  node analyses the input and selects one of several downstream paths, each
  leading to a specialised handler or sub-workflow.

  This pattern is the simplest form of orchestration and serves as a building
  block for more complex patterns. It adds minimal latency and token overhead
  while enabling clean separation of concerns. Rule-based routing is
  deterministic and fast; LLM-based semantic routing is more flexible but
  adds an inference call.
when_to_use:
  - Requests that fall into distinct categories requiring different handling
  - Multi-tenant systems where different customers need different workflows
  - Intent classification before dispatching to specialised agents
  - Load distribution across multiple equivalent handlers
when_not_to_use:
  - Tasks where all inputs should follow the same processing path
  - Scenarios where routing logic is too ambiguous for rules or classification
trade_offs:
  token_cost: low
  latency: low
  reliability: high
  complexity: low
  adaptability: medium
failure_modes:
  - Misclassification sends input to the wrong handler
  - Default/fallback route receives too much traffic due to poor rules
  - Rule explosion when the number of categories grows beyond maintainability
compatible_with:
  - react
  - handoff
  - multi-agent-chat
  - reflection
conflicts_with: []
example_graph:
  nodes:
    - id: input-1
      type: input
      label: Incoming Request
      position: { x: 0, y: 200 }
      config: { description: "Request to be classified and routed" }
      pattern_id: routing
      metadata: {}
    - id: router-1
      type: router
      label: Intent Router
      position: { x: 250, y: 200 }
      config: { strategy: semantic, routes: [technical, billing, general] }
      pattern_id: routing
      metadata: {}
    - id: llm-technical
      type: llm
      label: Technical Handler
      position: { x: 500, y: 50 }
      config: { model: claude-sonnet-4, temperature: 0.3, max_tokens: 1024, system_prompt: "You handle technical support queries." }
      pattern_id: routing
      metadata: {}
    - id: llm-billing
      type: llm
      label: Billing Handler
      position: { x: 500, y: 200 }
      config: { model: claude-sonnet-4, temperature: 0.3, max_tokens: 1024, system_prompt: "You handle billing inquiries." }
      pattern_id: routing
      metadata: {}
    - id: llm-general
      type: llm
      label: General Handler
      position: { x: 500, y: 350 }
      config: { model: claude-sonnet-4, temperature: 0.5, max_tokens: 1024, system_prompt: "You handle general questions." }
      pattern_id: routing
      metadata: {}
    - id: output-1
      type: output
      label: Response
      position: { x: 750, y: 200 }
      config: { description: "Routed response" }
      pattern_id: routing
      metadata: {}
  edges:
    - id: e-input-router
      source: input-1
      target: router-1
      source_handle: output
      target_handle: input
      type: data_flow
      label: null
    - id: e-router-technical
      source: router-1
      target: llm-technical
      source_handle: routed_output
      target_handle: prompt
      type: control_flow
      label: technical
    - id: e-router-billing
      source: router-1
      target: llm-billing
      source_handle: routed_output
      target_handle: prompt
      type: control_flow
      label: billing
    - id: e-router-general
      source: router-1
      target: llm-general
      source_handle: routed_output
      target_handle: prompt
      type: control_flow
      label: general
    - id: e-technical-output
      source: llm-technical
      target: output-1
      source_handle: response
      target_handle: input
      type: data_flow
      label: null
    - id: e-billing-output
      source: llm-billing
      target: output-1
      source_handle: response
      target_handle: input
      type: data_flow
      label: null
    - id: e-general-output
      source: llm-general
      target: output-1
      source_handle: response
      target_handle: input
      type: data_flow
      label: null
eval_profile:
  tokens_per_step: [100, 400, 1000]
  steps_per_task: [1, 2, 5]
  p50_latency_ms: 800
  p99_latency_ms: 3000
  failure_rate: 0.03
